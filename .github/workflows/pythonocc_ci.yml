name: PythonOCC CI (Backend Tests)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Backend Pytest with PythonOCC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencascade-dev

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install pythonocc-core==7.7.2
          pip install pytest fastapi pydantic httpx uvicorn python-multipart

      - name: Verify pythonocc-core Installation
        run: |
          python -c "from OCC.Core.BRepPrimAPI import BRepPrimAPI_MakeBox; print('pythonocc-core OK')"

      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          export PYTHONPATH=$(pwd)
          pytest tests/ -v --maxfail=2 --durations=5
